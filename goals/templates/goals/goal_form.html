<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <title>设定新目标 - SkillPath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">🎯 设定你的下一个里程碑</h5>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">学习目标名称</label>
                                <input type="text" name="title" class="form-control" placeholder="例如：掌握 Django 核心模型" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">目标详情描述</label>
                                <textarea name="description" class="form-control" rows="4" placeholder="可选：描述你的学习计划..."></textarea>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">确认保存</button>
                                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">取消返回</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
