<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设定新目标 - SkillPath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-border: #edece9;
            --notion-focus: #5297ff;
            --notion-tag-bg: #e3e2e0;
        }

        body {
            background-color: var(--notion-bg);
            color: var(--notion-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-container {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            border: 1px solid var(--notion-border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 {
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #787774;
            margin-bottom: 8px;
            display: block;
        }

        /* 统一 Django 自动生成的 input 和 select 样式 */
        .form-control, select, textarea {
            border: 1px solid var(--notion-border) !important;
            border-radius: 8px !important;
            padding: 12px !important;
            margin-bottom: 20px !important;
            transition: border-color 0.2s;
            width: 100%;
            display: block;
            background-color: #fff;
        }

        .form-control:focus, select:focus, textarea:focus {
            border-color: var(--notion-focus) !important;
            box-shadow: 0 0 0 3px rgba(82, 151, 255, 0.1) !important;
            outline: none;
        }

        /* 标签系统样式 */
        #tag-container {
            background-color: #f9f9f8;
            border: 1px solid var(--notion-border);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            min-height: 48px;
            cursor: text;
        }

        #tag-container:focus-within {
            border-color: var(--notion-focus);
            box-shadow: 0 0 0 3px rgba(82, 151, 255, 0.1);
        }

        .tag-badge {
            background-color: var(--notion-tag-bg);
            color: var(--notion-text);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-badge .remove-btn {
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .tag-badge .remove-btn:hover {
            opacity: 1;
        }

        #tag-input {
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
            padding: 4px !important;
            margin-bottom: 0 !important;
            flex: 1;
            min-width: 80px;
            outline: none;
            font-size: 0.9rem;
        }

        .btn-save {
            background-color: var(--notion-text);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-save:hover {
            opacity: 0.8;
            color: white;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #acaba9;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-back:hover {
            color: var(--notion-text);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>🎯 开启新征程</h2>
        <form method="post" id="goal-form">
            {% csrf_token %}
            
            <div class="mb-1">
                <label class="form-label">目标名称</label>
                {{ form.title }}
            </div>
            
            <div class="mb-1">
                <label class="form-label">目标描述</label>
                {{ form.description }}
            </div>

            <div class="mb-1">
                <label class="form-label">分类标签 (按回车添加)</label>
                <div id="tag-container" onclick="document.getElementById('tag-input').focus()">
                    <input type="text" id="tag-input" placeholder="例如：Python..." autocomplete="off">
                </div>
                <input type="hidden" name="tags_data" id="hidden-tags-input">
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-1">
                    <label class="form-label">截止日期</label>
                    <input type="date" name="deadline" class="form-control" value="{{ form.deadline.value|default:'' }}">
                </div>
                <div class="col-md-6 mb-1">
                    <label class="form-label">优先级</label>
                    {{ form.priority }}
                </div>
            </div>

            <button type="submit" class="btn-save" id="submit-btn">确认开启</button>
            <a href="{% url 'goal_list' %}" class="btn-back">返回我的库</a>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tagInput = document.getElementById('tag-input');
            const tagContainer = document.getElementById('tag-container');
            const hiddenInput = document.getElementById('hidden-tags-input');
            const goalForm = document.getElementById('goal-form');
            const tags = new Set();

            // 处理回车键添加标签
            tagInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); // 阻止表单提交
                    const val = tagInput.value.trim();
                    if (val && !tags.has(val)) {
                        addTag(val);
                        tagInput.value = '';
                    }
                }

                // 处理退格键删除最后一个标签
                if (e.key === 'Backspace' && tagInput.value === '' && tags.size > 0) {
                    const tagList = Array.from(tags);
                    removeTag(tagList[tagList.length - 1]);
                }
            });

            // 核心修复：提交表单前最后一次同步数据
            goalForm.addEventListener('submit', function(e) {
                // 如果输入框里还有没回车的文字，也把它加进去
                const finalVal = tagInput.value.trim();
                if (finalVal) {
                    tags.add(finalVal);
                }
                updateHiddenInput();
                console.log("即将提交的标签数据:", hiddenInput.value);
            });

            function addTag(val) {
                tags.add(val);
                renderTags();
            }

            function removeTag(val) {
                tags.delete(val);
                renderTags();
            }

            function updateHiddenInput() {
                hiddenInput.value = Array.from(tags).join(',');
            }

            function renderTags() {
                // 清除当前 DOM 中的标签（保留 input）
                const existingBadges = tagContainer.querySelectorAll('.tag-badge');
                existingBadges.forEach(badge => badge.remove());

                // 重新渲染标签
                tags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag-badge';
                    span.innerHTML = `
                        ${tag}
                        <span class="remove-btn" data-tag="${tag}">&times;</span>
                    `;
                    
                    // 点击删除按钮逻辑
                    span.querySelector('.remove-btn').onclick = (e) => {
                        e.stopPropagation();
                        removeTag(tag);
                    };
                    
                    tagContainer.insertBefore(span, tagInput);
                });

                // 实时更新隐藏字段
                updateHiddenInput();
            }
        });
    </script>
</body>
</html>
