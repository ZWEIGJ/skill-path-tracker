<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ goal.title }} - 详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-hover: #f1f1ef;
            --notion-border: #edece9;
            --notion-blue: #5297ff;
        }

        body {
            background-color: var(--notion-bg);
            color: var(--notion-text);
            font-family: -apple-system, sans-serif;
            padding-top: 50px;
        }

        .notion-container { max-width: 720px; margin: 0 auto; padding: 0 20px; }
        .goal-header { margin-bottom: 40px; }
        .goal-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .goal-desc { color: #787774; font-size: 1.1rem; margin-bottom: 20px; }

        .progress-bar-container { height: 4px; background: var(--notion-border); border-radius: 2px; margin-bottom: 30px; }
        .progress-fill { 
            height: 100%; background: var(--notion-blue); width: 0%; 
            transition: width 0.4s ease; 
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            position: relative;
        }

        /* 修复 CSS 错误：删除非法的 group 属性 */
        .task-item:hover .hover-show { opacity: 1; }

        .task-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
        }

        .task-text {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 1rem;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #acaba9;
        }

        .new-task-input {
            border: none;
            padding: 8px 0;
            width: 100%;
            outline: none;
            color: var(--notion-text);
            margin-top: 10px;
        }

        .hover-show {
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #eb5757;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="notion-container" 
     id="goal-config" 
     data-goal-id="{{ goal.id }}"
     data-add-url="{% url 'subtask_add' goal.id %}"
     data-csrf="{{ csrf_token }}">

    <a href="{% url 'goal_list' %}" class="text-muted text-decoration-none small mb-4 d-block">← 返回所有目标</a>

    <div class="goal-header">
        <h1 class="goal-title">{{ goal.title }}</h1>
        <p class="goal-desc">{{ goal.description|default:"" }}</p>
        <div class="progress-bar-container">
            <div id="main-progress" class="progress-fill" data-percent="{{ progress_percentage }}"></div>
        </div>
    </div>

    <div id="subtask-list">
        {% for task in subtasks %}
        <div class="task-item" id="task-{{ task.id }}">
            <input type="checkbox" class="task-checkbox" 
                   {% if task.is_completed %}checked{% endif %}
                   onchange="toggleTask('{{ task.id }}')">
            <span class="task-text {% if task.is_completed %}completed{% endif %}">{{ task.title }}</span>
            <button class="hover-show" onclick="deleteTask('{{ task.id }}')">×</button>
        </div>
        {% endfor %}
    </div>

    <input type="text" class="new-task-input" id="quick-add-input" 
           placeholder="+ 输入拆分工作点，按回车添加..." 
           onkeypress="if(event.keyCode==13) addTask()">
</div>

<script>
    const config = document.getElementById('goal-config').dataset;

    function updateProgressBar(percent) {
        document.getElementById('main-progress').style.width = percent + '%';
    }

    window.onload = () => {
        updateProgressBar(document.getElementById('main-progress').dataset.percent);
    };

    function addTask() {
        const input = document.getElementById('quick-add-input');
        const title = input.value.trim();
        if (!title) return;

        const formData = new FormData();
        formData.append('title', title);
        formData.append('csrfmiddlewaretoken', config.csrf);

        fetch(config.addUrl, {
            method: 'POST',
            body: formData,
            headers: {'X-Requested-With': 'XMLHttpRequest'}
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                const html = `
                    <div class="task-item" id="task-${data.task_id}">
                        <input type="checkbox" class="task-checkbox" onchange="toggleTask('${data.task_id}')">
                        <span class="task-text">${data.task_title}</span>
                        <button class="hover-show" onclick="deleteTask('${data.task_id}')">×</button>
                    </div>`;
                document.getElementById('subtask-list').insertAdjacentHTML('beforeend', html);
                input.value = '';
                updateProgressBar(data.progress_percentage);
            }
        });
    }

    function toggleTask(taskId) {
        fetch(`/subtask/toggle/${taskId}/`, {
            headers: {'X-Requested-With': 'XMLHttpRequest'}
        })
        .then(res => res.json())
        .then(data => {
            const text = document.querySelector(`#task-${taskId} .task-text`);
            data.is_completed ? text.classList.add('completed') : text.classList.remove('completed');
            updateProgressBar(data.progress_percentage);
        });
    }

    function deleteTask(taskId) {
        if (!confirm('确定要删除这个任务吗？')) return;
        fetch(`/subtask/delete/${taskId}/`, {
            headers: {'X-Requested-With': 'XMLHttpRequest'}
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById(`task-${taskId}`).remove();
            updateProgressBar(data.progress_percentage);
        });
    }
</script>
</body>
</html>
