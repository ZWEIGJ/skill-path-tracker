<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <title>加入学习路径规划 - SkillPath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .reg-card { max-width: 500px; margin: 50px auto; border: none; border-radius: 15px; }
        /* 针对 Django 自动生成的 ul 错误提示进行修饰 */
        .errorlist { color: #dc3545; font-size: 0.85em; list-style: none; padding-left: 0; }
        .helptext { display: block; color: #6c757d; font-size: 0.8em; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card reg-card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 fw-bold text-success">加入 SkillPath</h3>
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">{{ field.label }}</label>
                            <div class="input-group">
                                {{ field }}
                            </div>
                            {% if field.errors %}
                                {{ field.errors }}
                            {% endif %}
                            {% if field.help_text %}
                                <span class="helptext">{{ field.help_text }}</span>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg">立即注册</button>
                    </div>
                </form>
                
                <hr class="my-4">
                <div class="text-center">
                    <span class="small text-muted">已有账号？</span>
                    <a href="{% url 'login' %}" class="small text-decoration-none">点此登录</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.classList.add('form-control');
        });
    </script>
</body>
</html>
