<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入 SkillPath - 数据驱动成长</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --notion-blue: #5297ff;
            --notion-bg: #f8f9fa;
            --notion-border: #edece9;
            --notion-text: #37352f;
        }

        body { 
            background-color: var(--notion-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--notion-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            margin: 0;
        }

        .reg-card { 
            width: 100%;
            max-width: 480px;
            background: #fff; 
            border: 1px solid var(--notion-border);
            border-radius: 24px; 
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--notion-blue);
            text-align: center;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            display: block;
            text-decoration: none;
        }

        .reg-subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        /* 覆盖 Bootstrap 的 form-control 打造 Notion 感 */
        .form-control, .form-select {
            border: 1px solid var(--notion-border) !important;
            padding: 12px 16px !important; 
            border-radius: 12px !important;
            background: #fafafa !important; 
            transition: all 0.2s ease !important;
            font-size: 0.95rem !important;
            box-shadow: none !important;
        }

        .form-control:focus, .form-select:focus {
            background: #fff !important;
            border-color: var(--notion-blue) !important;
            box-shadow: 0 0 0 4px rgba(82, 151, 255, 0.1) !important;
            outline: none !important;
        }

        .form-label { 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #adb5bd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 2px;
            margin-bottom: 8px;
        }

        /* 错误列表样式优化 */
        .errorlist { 
            color: #f5222d; 
            font-size: 0.8rem; 
            list-style: none; 
            padding: 8px 12px; 
            margin: 8px 0 0 0;
            background: #fff1f0;
            border-radius: 8px;
        }
        
        .helptext { 
            display: block; 
            color: #adb5bd; 
            font-size: 0.75rem; 
            margin-top: 6px; 
            line-height: 1.4;
            padding-left: 2px;
        }

        .notion-btn {
            background: var(--notion-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            margin-top: 20px;
            width: 100%;
        }

        .notion-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(82, 151, 255, 0.2);
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #6c757d;
            border-top: 1px solid var(--notion-border);
            padding-top: 25px;
        }

        .footer-text a {
            color: var(--notion-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="reg-card">
        <a href="/" class="brand-logo">SkillPath</a>
        <p class="reg-subtitle">创建账号，开启你的技能进化路径</p>
        
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="mb-4">
                    <label class="form-label">{{ field.label }}</label>
                    <div>
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <div class="errorlist">
                            {% for error in field.errors %}
                                <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
                            {% endfor %}
                        </div>
                    {% endif %}
                    {% if field.help_text %}
                        <span class="helptext">{{ field.help_text }}</span>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="notion-btn">立即注册并开启</button>
        </form>
        
        <div class="footer-text">
            已经有账号了？ <a href="{% url 'login' %}">点此登录</a>
        </div>
    </div>

    <script>
        // 自动为 Django 生成的表单元素添加 Bootstrap 类名
        document.querySelectorAll('input, select, textarea').forEach(el => {
            if (el.type !== 'checkbox' && el.type !== 'radio') {
                el.classList.add('form-control');
            } else {
                el.classList.add('form-check-input');
            }
        });
    </script>
</body>
</html>
