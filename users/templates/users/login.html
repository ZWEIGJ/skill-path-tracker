<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <title>登录 - SkillPath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .login-card { margin-top: 100px; border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card shadow-sm">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 fw-bold text-primary">SkillPath</h3>
                        <p class="text-center text-muted small mb-4">请登录以管理你的技能路径</p>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label small fw-bold">用户名</label>
                                <input type="text" name="username" class="form-control" placeholder="请输入账号" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">密码</label>
                                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">进入系统</button>
                            </div>
                        </form>
                        
                        <hr class="my-4">
                        <div class="text-center">
                            <span class="small text-muted">还没账号？</span>
                            <a href="{% url 'register' %}" class="small text-decoration-none">立即注册</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
