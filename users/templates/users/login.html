<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - SkillPath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --notion-blue: #5297ff;
            --notion-bg: #f8f9fa;
            --notion-border: #edece9;
            --notion-text: #37352f;
        }

        body { 
            background-color: var(--notion-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--notion-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card { 
            width: 100%;
            max-width: 400px;
            background: #fff; 
            border: 1px solid var(--notion-border);
            border-radius: 20px; 
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--notion-blue);
            text-align: center;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            display: block;
            text-decoration: none;
        }

        .login-subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .form-label { 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #6c757d;
            margin-left: 4px;
            margin-bottom: 6px;
        }

        .notion-input {
            border: 1px solid var(--notion-border);
            padding: 12px 16px; 
            border-radius: 12px;
            background: #fafafa; 
            transition: all 0.2s ease;
            width: 100%;
            font-size: 0.95rem;
        }

        .notion-input:focus {
            background: #fff;
            border-color: var(--notion-blue);
            box-shadow: 0 0 0 4px rgba(82, 151, 255, 0.1);
            outline: none;
        }

        .notion-btn {
            background: var(--notion-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s ease;
            margin-top: 10px;
            width: 100%;
        }

        .notion-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(82, 151, 255, 0.2);
        }

        .notion-btn:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: #adb5bd;
        }

        .footer-text a {
            color: var(--notion-blue);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* 错误信息样式 */
        .alert {
            font-size: 0.85rem;
            border-radius: 10px;
            border: none;
            background-color: #fff1f0;
            color: #f5222d;
            padding: 10px 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="/" class="brand-logo">SkillPath</a>
        <p class="login-subtitle">数据驱动成长，规划成就未来</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert"><i class="fas fa-exclamation-circle me-2"></i>{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="notion-input" placeholder="输入用户名" required autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="notion-input" placeholder="输入密码" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="notion-btn">立即登录</button>
        </form>
        
        <div class="footer-text">
            还没有账号？ <a href="{% url 'register' %}">立即注册</a>
        </div>
    </div>

</body>
</html>
